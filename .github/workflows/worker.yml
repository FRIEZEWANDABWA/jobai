name: Scrape Worker
on:
  schedule:
    - cron: '*/5 * * * *' # Run every 5 minutes
  workflow_dispatch:

concurrency:
  group: scrape-worker
  cancel-in-progress: false

jobs:
  run-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Scrape Worker
        run: |
          curl -f -s -S -L -X POST ${{ secrets.PRODUCTION_URL }}/api/worker/scrape \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
