name: AI Job Scraper & Matcher Cron

on:
  schedule:
    # Run every 1 hour
    - cron: '0 * * * *'
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Ingestion API
        run: |
          curl -X POST ${{ secrets.PRODUCTION_URL }}/api/cron/ingest \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"

      - name: Trigger Matching & Notifications API
        run: |
          curl -X POST ${{ secrets.PRODUCTION_URL }}/api/cron/match \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
